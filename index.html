<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Finance Dashboard</title>
    <link rel="stylesheet" href="/style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body>

<div class="top-bar">
    <div class="nav-links">
        <a href="/index.html">Home</a>
        <a href="/add.html">Add</a>
        <a href="/other_transactions.html">Other</a>
        <a href="/categories.html">Categories</a>
        <a href="/account.html">Account</a>
    </div>
</div>

<div class="container">

<h1>Finance Dashboard</h1>

<!-- Month selector -->
<form id="monthForm">
    <label>Select Month</label>
    <select id="monthSelect"></select>
</form>

<div class="summary-cards">
    <div class="card income">
        <h3>Income</h3>
        <p id="incomeValue">0</p>
    </div>

    <div class="card expense">
        <h3>Expense</h3>
        <p id="expenseValue">0</p>
    </div>

    <div class="card balance">
        <h3>Balance</h3>
        <p id="balanceValue">0</p>
    </div>
</div>

<div class="chart-row" style="display:flex; gap:20px; margin-top:20px;">
    <div class="chart-box" style="flex:1; background:white; padding:15px; border-radius:6px; box-shadow:0 0 5px rgba(0,0,0,0.1);">
        <h3>Income Breakdown</h3>
        <canvas id="incomeChart"></canvas>
    </div>

    <div class="chart-box" style="flex:1; background:white; padding:15px; border-radius:6px; box-shadow:0 0 5px rgba(0,0,0,0.1);">
        <h3>Expense Breakdown</h3>
        <canvas id="expenseChart"></canvas>
    </div>
</div>

<div class="table-box">
    <h2>Transactions</h2>

    <table id="transactionsTable">
        <thead>
            <tr>
                <th>Date</th>
                <th>Category</th>
                <th>Type</th>
                <th>Amount</th>
                <th>Notes</th>
                <th>Actions</th>
            </tr>
        </thead>
        <tbody></tbody>
    </table>
</div>

</div>

<script>
// ------------------------------
// Helpers
// ------------------------------
function getCurrentMonth() {
    const d = new Date();
    return d.toISOString().slice(0, 7);
}

function generateMonthList() {
    const select = document.getElementById("monthSelect");
    const now = new Date();
    const months = [];

    for (let i = 0; i < 12; i++) {
        const d = new Date(now.getFullYear(), now.getMonth() - i, 1);
        const m = d.toISOString().slice(0, 7);
        months.push(m);
    }

    months.forEach(m => {
        const opt = document.createElement("option");
        opt.value = m;
        opt.textContent = m;
        select.appendChild(opt);
    });
}

// ------------------------------
// Load dashboard data
// ------------------------------
async function loadDashboard() {
    const month = document.getElementById("monthSelect").value;

    const res = await fetch(`/api/transactions?month=${month}`);
    const data = await res.json();

    const transactions = data.transactions || [];

    // Summary
    let income = 0;
    let expense = 0;

    transactions.forEach(t => {
        if (t.type === "income") income += t.amount;
        else expense += t.amount;
    });

    document.getElementById("incomeValue").textContent = income.toFixed(2);
    document.getElementById("expenseValue").textContent = expense.toFixed(2);
    document.getElementById("balanceValue").textContent = (income - expense).toFixed(2);

    // Table
    const tbody = document.querySelector("#transactionsTable tbody");
    tbody.innerHTML = "";

    transactions.forEach(t => {
        const tr = document.createElement("tr");
        tr.innerHTML = `
            <td>${t.date}</td>
            <td>${t.category}</td>
            <td>${t.type}</td>
            <td>${t.amount}</td>
            <td>${t.notes || ""}</td>
            <td>
                <a class="btn" href="/edit.html?id=${t.id}">Edit</a>
                <button class="btn btn-danger" onclick="deleteTransaction(${t.id})">Delete</button>
            </td>
        `;
        tbody.appendChild(tr);
    });

    // Charts
    loadCharts(transactions);
}

// ------------------------------
// Delete transaction
// ------------------------------
async function deleteTransaction(id) {
    if (!confirm("Delete this transaction?")) return;

    await fetch(`/api/transactions/delete/${id}`, { method: "DELETE" });
    loadDashboard();
}

// ------------------------------
// Charts
// ------------------------------
let incomeChart, expenseChart;

function loadCharts(transactions) {
    const incomeMap = {};
    const expenseMap = {};

    transactions.forEach(t => {
        if (t.type === "income") {
            incomeMap[t.category] = (incomeMap[t.category] || 0) + t.amount;
        } else {
            expenseMap[t.category] = (expenseMap[t.category] || 0) + t.amount;
        }
    });

    const incomeLabels = Object.keys(incomeMap);
    const incomeValues = Object.values(incomeMap);

    const expenseLabels = Object.keys(expenseMap);
    const expenseValues = Object.values(expenseMap);

    if (incomeChart) incomeChart.destroy();
    if (expenseChart) expenseChart.destroy();

    incomeChart = new Chart(document.getElementById("incomeChart"), {
        type: "pie",
        data: {
            labels: incomeLabels,
            datasets: [{
                data: incomeValues,
                backgroundColor: ["#4caf50", "#81c784", "#a5d6a7", "#c8e6c9"]
            }]
        }
    });

    expenseChart = new Chart(document.getElementById("expenseChart"), {
        type: "pie",
        data: {
            labels: expenseLabels,
            datasets: [{
                data: expenseValues,
                backgroundColor: ["#f44336", "#e57373", "#ef9a9a", "#ffcdd2"]
            }]
        }
    });
}

// ------------------------------
// Init
// ------------------------------
generateMonthList();
document.getElementById("monthSelect").value = getCurrentMonth();
document.getElementById("monthSelect").addEventListener("change", loadDashboard);

loadDashboard();
</script>

</body>
</html>
